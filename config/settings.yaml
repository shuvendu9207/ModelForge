# ModelForge Global Settings

project:
  name: ModelForge
  version: "1.0"
  experiment_db: experiments/experiments.db

data:
  default_target_column: "label"
  test_size: 0.2
  random_state: 42
  validation_split: 0.1

preprocessing:
  handle_missing: mean          # mean | median | drop
  scale_method: standard        # standard | minmax | none
  encode_method: onehot         # onehot | label | none

features:
  selection_method: variance    # variance | mutual_info | none
  n_features: 20
  polynomial_degree: 1

training:
  cv_folds: 5
  n_jobs: -1
  verbose: 1

tracking:
  backend: sqlite               # sqlite | mlflow
  mlflow_uri: "http://localhost:5000"
  save_artifacts: true

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc

dashboard:
  host: "localhost"
  port: 8501
  theme: dark
