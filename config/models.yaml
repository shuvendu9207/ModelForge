# ModelForge — Model Hyperparameter Defaults

linear_regression:
  fit_intercept: true
  normalize: false

logistic_regression:
  C: 1.0
  max_iter: 1000
  solver: lbfgs
  multi_class: auto

random_forest:
  n_estimators: 100
  max_depth: null
  min_samples_split: 2
  min_samples_leaf: 1
  random_state: 42

svm:
  C: 1.0
  kernel: rbf
  gamma: scale
  probability: true

xgboost:
  n_estimators: 100
  learning_rate: 0.1
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  use_label_encoder: false
  eval_metric: logloss
